<!doctype html>
<html class="no-js" lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contato | Cristiane </title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <nav class="navbar">
      <div class="logo">
        <h1>Manicure <span> Cristiane</span></h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="servicos.html">Serviços</a></li>
        <li><a href="contato.html" class="active">Contato</a></li>
      </ul>
      <div class="header-actions">
        <button id="dark-mode-toggle" aria-label="Alternar modo escuro">
          <span class="icon">🌙</span>
        </button>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="contact-section">
      <h2>Agende seu Horário</h2>
      <p>Preencha o formulário abaixo e entraremos em contato o mais breve possível.</p>

      <form id="contactForm" class="contact-form">
        <div class="form-group">
          <label for="name">Nome Completo:</label>
          <input type="text" id="name" name="name" required>
          <span class="error-msg" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required>
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="message">Mensagem / Procedimento de Interesse:</label>
          <textarea id="message" name="message" rows="5" required></textarea>
          <span class="error-msg" id="messageError"></span>
        </div>

        <button type="submit" class="btn-primary">Enviar Mensagem</button>
      </form>

      <div id="successMessage" class="hidden">
        <p>Mensagem enviada com sucesso! Em breve entraremos em contato.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Manicure Cristiane - Todos os direitos reservados.</p>
  </footer>

  <!-- WhatsApp Floating Button -->
  <a href="https://api.whatsapp.com/send?phone=5500000000000&text=Olá,%20gostaria%20de%20agendar%20um%20horário%20com%20a%20Cristiane!" class="whatsapp-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
  </a>

  <!-- VLibras Widget -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script src="js/app.js"></script>
</body>
</html>
